spring:
  datasource:
    url: ${DEV_DB_URL:jdbc:h2:mem:diet_assistant;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: ${DEV_DB_USERNAME:sa}
    password: ${DEV_DB_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${DEV_JPA_DDL_AUTO:update}
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: ${DEV_SQL_INIT_MODE:never}
