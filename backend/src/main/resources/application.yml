server:
  port: 8080

spring:
  application:
    name: diet-assistant
  datasource:
    url: jdbc:mysql://localhost:3306/diet_assistant?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: username
    password: password
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    com.health.diet: DEBUG

# 阿里云百炼 DashScope AI 配置（通义千问多模态模型）
ai:
  dashscope:
    api-key: temp
    model: qwen-omni-turbo              # 多模态模型：支持图片/文字/语音
    text-model: qwen-turbo-latest       # 纯文本模型：更便宜，用于文字解析
    multimodal-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation
    text-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    max-tokens: 1000
    timeout: 20000
